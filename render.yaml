# Render Blueprint — provisions the web service only.
# The database lives on Neon, so DATABASE_URL is set manually (see below).
# In Render: New → Blueprint → connect this repo. It reads this file.
services:
  - type: web
    name: saaspilot
    runtime: node
    plan: free
    # Install dev deps (vite/tsc/prisma needed to build), build, then apply
    # any new migrations. Free tier has no preDeployCommand, so migrate here.
    buildCommand: npm install --include=dev && npm run build && npx prisma migrate deploy
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      # Paste your Neon connection string in the Render dashboard (Environment tab).
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true # Render generates a strong random token (view it in the dashboard)
      - key: NODE_VERSION
        value: "20.18.0"
      # Do NOT set NODE_ENV here — `npm run start` already sets it to production.
